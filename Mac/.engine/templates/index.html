<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Manifest — local video downloader</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel-2: #1c2330;
    --border: #2a3340;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #6e8bff;
    --accent-2: #4f6bff;
    --green: #2ea043;
    --red: #f85149;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #15203a 0%, var(--bg) 55%);
    color: var(--text);
    min-height: 100vh;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 48px 20px 80px; }
  header { text-align: center; margin-bottom: 32px; }
  .logo {
    font-size: 30px; font-weight: 800; letter-spacing: -0.5px;
    background: linear-gradient(90deg, #8aa0ff, #c08bff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .tag { color: var(--muted); font-size: 14px; margin-top: 6px; }
  .searchbar { display: flex; gap: 10px; margin-bottom: 8px; }
  input[type="text"] {
    flex: 1; background: var(--panel); border: 1px solid var(--border);
    color: var(--text); padding: 14px 16px; border-radius: 12px; font-size: 15px;
    outline: none; transition: border-color .15s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  button {
    border: none; cursor: pointer; font-size: 15px; font-weight: 600;
    border-radius: 12px; padding: 14px 22px; color: white;
    background: linear-gradient(180deg, var(--accent), var(--accent-2));
    transition: filter .15s, opacity .15s;
  }
  button:hover { filter: brightness(1.08); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .hint { color: var(--muted); font-size: 12.5px; text-align: center; margin-top: 4px; }
  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 16px; padding: 18px; margin-top: 24px;
  }
  .meta { display: flex; gap: 16px; align-items: flex-start; }
  .meta img { width: 160px; border-radius: 10px; object-fit: cover; background: #000; }
  .meta .title { font-size: 17px; font-weight: 700; line-height: 1.3; }
  .meta .sub { color: var(--muted); font-size: 13px; margin-top: 6px; }
  .pill {
    display: inline-block; background: var(--panel-2); border: 1px solid var(--border);
    color: var(--muted); font-size: 11.5px; padding: 3px 8px; border-radius: 999px;
    margin-right: 6px; margin-top: 8px;
  }
  .section-title { font-size: 13px; color: var(--muted); margin: 22px 0 10px;
    text-transform: uppercase; letter-spacing: .6px; }
  .formats { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 10px; }
  .fmt {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; cursor: pointer; transition: border-color .15s, transform .1s;
    display: flex; flex-direction: column; gap: 4px;
  }
  .fmt:hover { border-color: var(--accent); transform: translateY(-1px); }
  .fmt .lbl { font-weight: 700; font-size: 15px; }
  .fmt .det { color: var(--muted); font-size: 12px; }
  .fmt .badge { font-size: 10.5px; color: var(--accent); font-weight: 600; }
  .progress-wrap { margin-top: 8px; }
  .bar { height: 10px; background: var(--panel-2); border-radius: 999px; overflow: hidden; }
  .bar > span { display: block; height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), #c08bff); transition: width .25s; }
  .status { color: var(--muted); font-size: 13px; margin-top: 10px; }
  .error { color: var(--red); font-size: 14px; margin-top: 14px; white-space: pre-wrap; }
  .warning {
    color: #f0b132; font-size: 13.5px; margin-top: 14px;
    background: rgba(240, 177, 50, 0.08); border: 1px solid rgba(240, 177, 50, 0.25);
    padding: 10px 14px; border-radius: 10px; white-space: pre-wrap;
  }
  .done-btn { background: linear-gradient(180deg, #34c759, #2ea043); width: 100%; margin-top: 14px; }
  .spinner {
    width: 16px; height: 16px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; display: inline-block;
    vertical-align: -3px; margin-right: 8px; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display: none; }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">⬇ Manifest</div>
      <div class="tag">Paste a link from any site — download it locally, no cloud, no lag.</div>
    </header>

    <div class="searchbar">
      <input id="url" type="text" placeholder="https://…  (YouTube, TikTok, Instagram, X, Reddit, …)" autocomplete="off" />
      <button id="fetchBtn">Fetch</button>
    </div>
    <div class="hint">Tip: press Enter to fetch. Files are saved to the <code>downloads/</code> folder and offered as a browser download.</div>

    <div id="errorBox" class="error hidden"></div>
    <div id="warningBox" class="warning hidden"></div>

    <div id="infoCard" class="card hidden">
      <div class="meta">
        <img id="thumb" alt="" />
        <div>
          <div id="vtitle" class="title"></div>
          <div id="vsub" class="sub"></div>
          <div id="vpills"></div>
        </div>
      </div>

      <div id="videoSection">
        <div class="section-title">Video</div>
        <div id="videoFormats" class="formats"></div>
      </div>
      <div id="audioSection">
        <div class="section-title">Audio only</div>
        <div id="audioFormats" class="formats"></div>
      </div>
    </div>

    <div id="dlCard" class="card hidden">
      <div id="dlTitle" class="title"></div>
      <div class="progress-wrap">
        <div class="bar"><span id="barFill"></span></div>
      </div>
      <div id="dlStatus" class="status"></div>
      <a id="saveBtn" class="done-btn hidden" style="display:block;text-align:center;text-decoration:none;padding:14px;border-radius:12px;color:#fff;">Save file</a>
    </div>
  </div>

<script>
const $ = (id) => document.getElementById(id);
let currentUrl = "";

function showError(msg) {
  const box = $("errorBox");
  box.textContent = msg;
  box.classList.remove("hidden");
}
function clearError() { $("errorBox").classList.add("hidden"); }
function showWarning(msg) {
  const box = $("warningBox");
  if (!msg) { box.classList.add("hidden"); return; }
  box.textContent = msg;
  box.classList.remove("hidden");
}
function clearWarning() { $("warningBox").classList.add("hidden"); }

async function fetchInfo() {
  const url = $("url").value.trim();
  if (!url) return;
  clearError();
  clearWarning();
  $("infoCard").classList.add("hidden");
  $("dlCard").classList.add("hidden");
  $("fetchBtn").disabled = true;
  $("fetchBtn").textContent = "Fetching…";
  try {
    const res = await fetch("/info", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url }),
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error || "Failed to read link."); return; }
    currentUrl = data.webpage_url || url;
    if (data.warning) showWarning(data.warning);
    renderInfo(data);
  } catch (e) {
    showError("Network error: " + e.message);
  } finally {
    $("fetchBtn").disabled = false;
    $("fetchBtn").textContent = "Fetch";
  }
}

function renderInfo(d) {
  $("thumb").src = d.thumbnail || "";
  $("thumb").style.display = d.thumbnail ? "block" : "none";
  $("vtitle").textContent = d.title || "(untitled)";
  const subBits = [];
  if (d.uploader) subBits.push(d.uploader);
  if (d.duration_string) subBits.push(d.duration_string);
  $("vsub").textContent = subBits.join("  •  ");
  $("vpills").innerHTML = d.extractor ? `<span class="pill">${d.extractor}</span>` : "";

  const vids = d.formats.filter(f => f.kind === "video" || f.kind === "video-only");
  const auds = d.formats.filter(f => f.kind === "audio");

  $("videoFormats").innerHTML = "";
  vids.forEach(f => $("videoFormats").appendChild(fmtCard(f)));
  $("videoSection").style.display = vids.length ? "block" : "none";

  $("audioFormats").innerHTML = "";
  auds.forEach(f => $("audioFormats").appendChild(fmtCard(f)));
  $("audioSection").style.display = auds.length ? "block" : "none";

  $("infoCard").classList.remove("hidden");
}

function fmtCard(f) {
  const el = document.createElement("div");
  el.className = "fmt";
  const size = f.filesize_h ? f.filesize_h : "size unknown";
  const badge = f.kind === "video-only" ? `<div class="badge">+ best audio</div>`
              : f.kind === "audio" ? `<div class="badge">→ mp3</div>` : "";
  el.innerHTML = `<div class="lbl">${f.label}</div>
                  <div class="det">${f.ext} • ${size}</div>${badge}`;
  el.onclick = () => startDownload(f);
  return el;
}

let pollTimer = null;
async function startDownload(f) {
  clearError();
  $("infoCard").classList.add("hidden");
  $("dlCard").classList.remove("hidden");
  $("saveBtn").classList.add("hidden");
  $("barFill").style.width = "0%";
  $("dlTitle").textContent = `Downloading — ${f.label} (${f.ext})`;
  $("dlStatus").innerHTML = `<span class="spinner"></span>Starting…`;

  try {
    const res = await fetch("/download", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url: currentUrl, format_id: f.format_id, kind: f.kind }),
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error || "Could not start download."); return; }
    pollProgress(data.job_id);
  } catch (e) {
    showError("Network error: " + e.message);
  }
}

function pollProgress(jobId) {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    try {
      const res = await fetch(`/progress/${jobId}`);
      const j = await res.json();
      if (!res.ok) { clearInterval(pollTimer); showError(j.error || "Lost the job."); return; }

      $("barFill").style.width = (j.progress || 0) + "%";

      if (j.status === "downloading") {
        const bits = [`${j.progress || 0}%`];
        if (j.speed) bits.push(j.speed);
        if (j.eta != null) bits.push(`ETA ${j.eta}s`);
        $("dlStatus").innerHTML = `<span class="spinner"></span>${bits.join("  •  ")}`;
      } else if (j.status === "processing") {
        $("dlStatus").innerHTML = `<span class="spinner"></span>Merging / converting with ffmpeg…`;
      } else if (j.status === "done") {
        clearInterval(pollTimer);
        $("barFill").style.width = "100%";
        $("dlStatus").textContent = "✅ Done — saved to downloads/ folder.";
        const btn = $("saveBtn");
        btn.href = `/file/${jobId}`;
        btn.classList.remove("hidden");
        $("dlTitle").textContent = j.title || "Finished";
      } else if (j.status === "error") {
        clearInterval(pollTimer);
        $("dlStatus").textContent = "";
        showError("Download failed:\n" + (j.error || "unknown error"));
        $("dlCard").classList.add("hidden");
      }
    } catch (e) {
      clearInterval(pollTimer);
      showError("Lost connection: " + e.message);
    }
  }, 600);
}

$("fetchBtn").onclick = fetchInfo;
$("url").addEventListener("keydown", (e) => { if (e.key === "Enter") fetchInfo(); });
</script>
</body>
</html>
